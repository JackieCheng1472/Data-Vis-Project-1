<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Population distribution and GDP per capita</title>
    <link rel="icon" href="data:;base64,iVBORwOKGO=" />
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="header">
        <h1>Population distribution and GDP per capita</h1>
        <h2>Jackie Cheng</h2>
    </div>

   

    <div id="dashboard">

        <div id="controls">
             <div id="slider-container">
                <label for="year-slider">Year: <span id="year-label">2023</span></label>
                <input type="range" id="year-slider" min="2000" max="2023" step="1" value="2023">
            </div>
            <div id="scatter-controls">
                <div class="axis-selector">
                    <label>X Axis:</label>
                    <button class="x-btn active" data-attr="Urban">Urban %</button>
                    <button class="x-btn" data-attr="Rural">Rural %</button>
                    <button class="x-btn" data-attr="gdp">GDP per Capita</button>
                    <button class="x-btn" data-attr="gdi">GDI</button>
                    <button class="x-btn" data-attr="pop">Population</button>
                </div>
                <div class="axis-selector">
                    <label>Y Axis:</label>
                    <button class="y-btn" data-attr="Urban">Urban %</button>
                    <button class="y-btn" data-attr="Rural">Rural %</button>
                    <button class="y-btn" data-attr="gdp">GDP per Capita</button>
                    <button class="y-btn active" data-attr="gdi">GDI</button>
                    <button class="y-btn" data-attr="pop">Population</button>
                </div>
            </div>
        </div>
        <div id="row-2">
            <div>
                <div id="panel-3"></div>
                <p></p>
            </div>
            <div>
                <div id="plot"></div>
            </div>
        </div>
        <div id="row-1">
            <div id="panel-1"></div>
            <div id="panel-2"></div>
        </div>
        

        <div id="row-3">
            <div id="map"></div>
            
        </div>

    </div>

    <div id="tooltip"></div>

    <script src="js/d3.v6.min.js"></script>
    <script src="js/choroplethMap.js"></script>
    <script src="js/start.js"></script>
</body>
</html>
